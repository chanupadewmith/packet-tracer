<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome! Register</title>
  <link rel="icon" type="image/png" href="download.png">
  <link rel="stylesheet"  href="regi.css">


</head>
<body>

  <div class="card">
    <div class="left">
      <div>
        <div class="brand" id="brandText">Travelista Tours</div>
        <div class="tagline" id="taglineText">
          Join us and start your journey across Sri Lanka with unforgettable beaches, hills, culture, and adventure.
        </div>
      </div>

      <div class="left-bottom" id="leftBottomText">
        🇱🇰 Discover Sri Lanka • Nature • Heritage • Adventure
      </div>
    </div>

    <div class="right">
  <div>
    <div class="title" id="titleText">Create Account</div>
    <div class="sub" id="subText">Register to start your travel journey</div>
  </div>

  <form action="register.php" method="POST">
    <div class="two-cols">
      <div class="field">
        <label for="firstName" id="firstNameLabel">First Name</label>
        <input type="text" name="firstName" id="firstName" placeholder="Enter first name" required>
      </div>

      <div class="field">
        <label for="lastName" id="lastNameLabel">Last Name</label>
        <input type="text" name="lastName" id="lastName" placeholder="Enter last name" required>
      </div>
    </div>

    <div class="field">
      <label for="emailInput" id="emailLabel">Email ID</label>
      <input type="email" name="email" id="emailInput" placeholder="name@gmail.com" required>
    </div>

    <div class="field">
      <label for="phoneInput" id="phoneLabel">Phone Number</label>
      <input type="tel" name="phone" id="phoneInput" placeholder="+94 77 123 4567" required>
    </div>

    <div class="two-cols">
      <div class="field">
        <label for="passwordInput" id="passwordLabel">Password</label>
        <input type="password" name="password" id="passwordInput" placeholder="••••••••" required>
      </div>

      <div class="field">
        <label for="confirmPasswordInput" id="confirmPasswordLabel">Confirm Password</label>
        <input type="password" name="confirmPassword" id="confirmPasswordInput" placeholder="••••••••" required>
      </div>
    </div>

    <div class="terms">
      <input type="checkbox" id="terms" required>
      <label for="terms" id="termsText" style="display:inline; font-weight:500;">
        I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a>
      </label>
    </div>

    <button class="btn" id="registerBtn" type="submit">REGISTER</button>
  </form>

  <div class="or" id="orText">OR</div>

  <div class="social">
    <button class="sbtn" type="button">G</button>
    <button class="sbtn" type="button">f</button>
    <button class="sbtn" type="button"></button>
  </div>

  <div class="bottom" id="bottomText">
    Already have an account? <a href="login.html">Login Now</a>
  </div>
</div>

    function applyTranslations(lang) {
      const t = translations[lang] || translations.en;

      document.getElementById("brandText").innerText = t.brand;
      document.getElementById("taglineText").innerText = t.tagline;
      document.getElementById("leftBottomText").innerText = t.leftBottom;
      document.getElementById("titleText").innerText = t.title;
      document.getElementById("subText").innerText = t.sub;

      document.getElementById("firstNameLabel").innerText = t.firstName;
      document.getElementById("firstName").placeholder = t.firstNamePlaceholder;

      document.getElementById("lastNameLabel").innerText = t.lastName;
      document.getElementById("lastName").placeholder = t.lastNamePlaceholder;

      document.getElementById("emailLabel").innerText = t.email;
      document.getElementById("emailInput").placeholder = t.emailPlaceholder;

      document.getElementById("phoneLabel").innerText = t.phone;
      document.getElementById("phoneInput").placeholder = t.phonePlaceholder;

      document.getElementById("passwordLabel").innerText = t.password;
      document.getElementById("passwordInput").placeholder = t.passwordPlaceholder;

      document.getElementById("confirmPasswordLabel").innerText = t.confirmPassword;
      document.getElementById("confirmPasswordInput").placeholder = t.confirmPasswordPlaceholder;

      document.getElementById("termsText").innerHTML = t.terms;
      document.getElementById("registerBtn").innerText = t.register;
      document.getElementById("orText").innerText = t.or;
      document.getElementById("bottomText").innerHTML = t.bottom;
    }

    applyTranslations(currentLanguage);

</body>
</html>
