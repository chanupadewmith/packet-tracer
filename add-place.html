<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Place</title>
  <link rel="stylesheet" href="add-place.css">
</head>
<body>

  <div class="form-box">
    <h1>Add New Place</h1>

<form action="save_place.php" method="POST" enctype="multipart/form-data">
  
      <h2>English</h2>
      <div class="form-group">
        <label>Title (English)</label>
        <input type="text" name="title_en" required>
      </div>
      <div class="form-group">
        <label>Location (English)</label>
        <input type="text" name="location_en" required>
      </div>
      <div class="form-group">
        <label>Category (English)</label>
        <input type="text" name="category_en" required>
      </div>
      <div class="form-group">
        <label>Description (English)</label>
        <textarea name="description_en" required></textarea>
      </div>

      <h2>Sinhala</h2>
      <div class="form-group">
        <label>Title (Sinhala)</label>
        <input type="text" name="title_si" required>
      </div>
      <div class="form-group">
        <label>Location (Sinhala)</label>
        <input type="text" name="location_si" required>
      </div>
      <div class="form-group">
        <label>Category (Sinhala)</label>
        <input type="text" name="category_si" required>
      </div>
      <div class="form-group">
        <label>Description (Sinhala)</label>
        <textarea name="description_si" required></textarea>
      </div>

      <h2>Tamil</h2>
      <div class="form-group">
        <label>Title (Tamil)</label>
        <input type="text" name="title_ta" required>
      </div>
      <div class="form-group">
        <label>Location (Tamil)</label>
        <input type="text" name="location_ta" required>
      </div>
      <div class="form-group">
        <label>Category (Tamil)</label>
        <input type="text" name="category_ta" required>
      </div>
      <div class="form-group">
        <label>Description (Tamil)</label>
        <textarea name="description_ta" required></textarea>
      </div>

      <h2>Other Details</h2>
      <div class="form-group">
        <label>Price</label>
        <input type="number" name="price" step="0.01" required>
      </div>
      <div class="form-group">
        <label>Rating</label>
        <input type="number" name="rating" step="0.1" min="0" max="5" required>
      </div>
      <div class="form-group">
        <label>Tab</label>
        <select name="tab" required>
          <option value="explore">Explore</option>
          <option value="things">Travel Packages</option>
          <option value="transport">Transport</option>
          <option value="hotels">Hotels</option>
        </select>
      </div>

      <h2>Images</h2>
      <div class="form-group">
        <label>Main Image (shows on home page)</label>
        <input type="file" name="main_image" accept="image/*" required>
      </div>

      <div class="form-group">
        <label>Photo 1 (details page only)</label>
        <input type="file" name="photo1" accept="image/*" required>
      </div>

      <div class="form-group">
        <label>Photo 2 (details page only)</label>
        <input type="file" name="photo2" accept="image/*" required>
      </div>

      <div class="form-group">
        <label>Photo 3 (details page only)</label>
        <input type="file" name="photo3" accept="image/*" required>
      </div>

      <button type="submit">Save Place</button>
    </form>
  </div>

</body>
</html>
