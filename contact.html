<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f6f9;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .form-box{
      width:100%;
      max-width:500px;
      background:#fff;
      padding:30px;
      border-radius:16px;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#222;
    }

    .form-group{
      margin-bottom:16px;
    }

    label{
      display:block;
      margin-bottom:6px;
      font-weight:bold;
      color:#333;
    }

    input, textarea{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
      font-size:15px;
      outline:none;
    }

    textarea{
      resize:vertical;
      min-height:120px;
    }

    button{
      width:100%;
      padding:13px;
      border:none;
      border-radius:10px;
      background:#0077ff;
      color:#fff;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      background:#005ed1;
    }
  </style>
</head>
<body>

  <div class="form-box">
    <h1>Contact Us</h1>

    <form action="send-email.php" method="POST">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" required />
      </div>

      <div class="form-group">
        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" required />
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>

      <button type="submit">Send Message</button>
    </form>
  </div>

</body>
</html>
